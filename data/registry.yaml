snapshot_date: '2026-06-24'
global_policy: No automatic dataset acquisition when license_status is manual_review_required or blocked_until_verified.
datasets:
- id: oscar_toy_v1
  name: OSCAR deterministic toy smoke set
  domain:
  - synthetic_smoke
  role:
  - pipeline_smoke
  source_url: local:scripts/create_toy_dataset.py
  license: project-owned generated artifact
  license_status: verified
  download_mode: generate_local
  train_allowed: false
  evaluation_only: false
  annotations: single word/line bbox and transcription
  normalization: unicode_strict_v1
  split_policy: smoke only; prohibited for scientific claims
  leakage_notes: Not a benchmark; never use for model selection or publication performance.
  expected_path: data/toy
