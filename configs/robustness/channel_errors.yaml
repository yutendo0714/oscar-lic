config_version: 1
experiment_family: channel_robustness
threat_model: docs/THREAT_MODEL.md
channels:
  random_bit_error_rate: [0.000001, 0.00001, 0.0001, 0.001]
  burst_bits: [8, 32, 128, 256]
  packet_loss_probability: [0.001, 0.005, 0.01, 0.05]
protection:
  modes: [none, uniform_fec, utility_unequal_fec]
  overhead_fractions: [0.02, 0.05, 0.10]
  crc: true
policy:
  corruption_seeds: [211, 223, 227, 229, 233]
  identical_corruptions_across_methods: true
  invalid_decode: record_failure_and_attempt_base_fallback
metrics: [decode_success, silent_corruption, base_fallback_success, delta_cer, delta_lpips, total_bpp]
gate: G8_optional
