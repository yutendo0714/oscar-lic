acceptance_rules:
  round_trip: decoder output from saved bitstream must be deterministic for fixed
    software/hardware profile or documented otherwise
  file_rate: reported total bytes must match filesystem size exactly
  estimated_vs_actual: difference is reported; no universal tolerance until measured
    per model
  checkpoint_regression: after first valid reproduction, freeze per-image bpp/PSNR
    within absolute tolerances of 1e-6 for CPU-deterministic components and documented
    GPU tolerance for transforms
  paper_curve: do not fail reproduction solely on a BD-rate number until VTM version,
    points, RGB/YUV and interpolation match
